name: Build And Push ECR Images

on:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/build-and-push-ecr.yml"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/k8s/**"
      - "go.mod"
      - "go.sum"
      - "pkg/**"
      - "services/**"
  workflow_dispatch:

concurrency:
  group: build-and-promote-develop
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build And Push Service Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - orders
          - notifications
          - worker

    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: "971146591534.dkr.ecr.us-east-1.amazonaws.com"
      ECR_REPOSITORY_PREFIX: triad-app
      SECURITY_EVIDENCE_S3_BUCKET: "triad-dev-security"
      SECURITY_EVIDENCE_S3_PREFIX: "supply-chain/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: "arn:aws:iam::971146591534:role/github-actions-triad-app-ecr-push"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        uses: triad-platform/triad-ci-security/reusable-actions/build-image@main
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ matrix.service }}-sha-${{ steps.tags.outputs.short_sha }}
          context: .
          dockerfile: Dockerfile
          push: 'true'
          build_args: |
            SERVICE=${{ matrix.service }}

      - name: Build and push branch-sha tag
        uses: triad-platform/triad-ci-security/reusable-actions/build-image@main
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ matrix.service }}-${{ github.ref_name }}-${{ steps.tags.outputs.short_sha }}
          context: .
          dockerfile: Dockerfile
          push: 'true'
          build_args: |
            SERVICE=${{ matrix.service }}

      - name: Build and push branch tag
        uses: triad-platform/triad-ci-security/reusable-actions/build-image@main
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ matrix.service }}-${{ github.ref_name }}
          context: .
          dockerfile: Dockerfile
          push: 'true'
          build_args: |
            SERVICE=${{ matrix.service }}

      - name: Resolve immutable digest reference
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          repo="${ECR_REPOSITORY_PREFIX}-${{ matrix.service }}"
          tag="${{ matrix.service }}-sha-${short_sha}"
          digest="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${repo}" \
            --image-ids imageTag="${tag}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          image_ref="${ECR_REGISTRY}/${repo}@${digest}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "IMAGE_REF=${image_ref}" >> "${GITHUB_ENV}"

      - name: Generate SBOM
        uses: triad-platform/triad-ci-security/reusable-actions/sbom@develop
        with:
          image: ${{ steps.digest.outputs.image_ref }}
          output_file: sbom-${{ matrix.service }}.spdx.json

      - name: Scan image vulnerabilities
        uses: triad-platform/triad-ci-security/reusable-actions/scan@develop
        with:
          image: ${{ steps.digest.outputs.image_ref }}
          sbom_file: sbom-${{ matrix.service }}.spdx.json
          fail_on_severity: high
          output_file: grype-${{ matrix.service }}.json

      - name: Sign and attest image
        uses: triad-platform/triad-ci-security/reusable-actions/sign@develop
        with:
          image: ${{ steps.digest.outputs.image_ref }}
          sbom_file: sbom-${{ matrix.service }}.spdx.json
          predicate_type: spdxjson

      - name: Upload supply-chain evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-${{ matrix.service }}-${{ steps.tags.outputs.short_sha }}
          path: |
            sbom-${{ matrix.service }}.spdx.json
            grype-${{ matrix.service }}.json
          if-no-files-found: error

      - name: Upload supply-chain evidence to S3
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          prefix="${SECURITY_EVIDENCE_S3_PREFIX:-supply-chain/}"
          prefix="${prefix#/}"
          if [[ "${prefix}" != */ ]]; then
            prefix="${prefix}/"
          fi
          base_path="s3://${SECURITY_EVIDENCE_S3_BUCKET}/${prefix}triad-app/${GITHUB_SHA}/${{ matrix.service }}/"
          aws s3 cp "sbom-${{ matrix.service }}.spdx.json" "${base_path}sbom.spdx.json"
          aws s3 cp "grype-${{ matrix.service }}.json" "${base_path}grype.json"
          cat > evidence-metadata-${{ matrix.service }}.json <<JSON
          {
            "service": "${{ matrix.service }}",
            "git_sha": "${GITHUB_SHA}",
            "short_sha": "${short_sha}",
            "image_ref": "${IMAGE_REF}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "uploaded_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          aws s3 cp "evidence-metadata-${{ matrix.service }}.json" "${base_path}metadata.json"

  promote-dev-manifests:
    name: Promote GitOps Overlay To Image Digests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: "971146591534.dkr.ecr.us-east-1.amazonaws.com"
      ECR_REPOSITORY_PREFIX: triad-app
      GITOPS_REPO: triad-platform/triad-kubernetes-platform
      GITOPS_REF: develop
      GITOPS_PATH: workloads/pulsecart/dev/kustomization.yaml
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_REF }}
          token: ${{ secrets.TRIAD_PLATFORM_GITOPS_PAT }}
          path: gitops-platform

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: "arn:aws:iam::971146591534:role/github-actions-triad-app-ecr-push"

      - name: Rebase and push GitOps promotion
        shell: bash
        run: |
          set -euo pipefail

          update_digest() {
            local overlay_file="$1"
            local image_name="$2"
            local digest="$3"
            awk -v image_name="$image_name" -v digest="$digest" '
              $0 == "    newName: " image_name {
                print
                getline
                sub(/^[[:space:]]*(newTag|digest): .*/, "    digest: " digest)
                print
                next
              }
              { print }
            ' "${overlay_file}" > "${overlay_file}.tmp"
            mv "${overlay_file}.tmp" "${overlay_file}"
          }

          refresh_overlay() {
            local overlay_file="$1"
            local short_sha="${GITHUB_SHA::12}"
            local tag_suffix="develop-${short_sha}"

            api_gateway_digest="$(aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${ECR_REPOSITORY_PREFIX}-api-gateway" \
              --image-ids imageTag="api-gateway-${tag_suffix}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            orders_digest="$(aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${ECR_REPOSITORY_PREFIX}-orders" \
              --image-ids imageTag="orders-${tag_suffix}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            notifications_digest="$(aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${ECR_REPOSITORY_PREFIX}-notifications" \
              --image-ids imageTag="notifications-${tag_suffix}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            worker_digest="$(aws ecr describe-images \
              --region "${AWS_REGION}" \
              --repository-name "${ECR_REPOSITORY_PREFIX}-worker" \
              --image-ids imageTag="worker-${tag_suffix}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"

            sed -i "s|^# triad-app source revision: .*$|# triad-app source revision: ${GITHUB_SHA}|" "${overlay_file}"
            update_digest "${overlay_file}" "971146591534.dkr.ecr.us-east-1.amazonaws.com/triad-app-api-gateway" "${api_gateway_digest}"
            update_digest "${overlay_file}" "971146591534.dkr.ecr.us-east-1.amazonaws.com/triad-app-orders" "${orders_digest}"
            update_digest "${overlay_file}" "971146591534.dkr.ecr.us-east-1.amazonaws.com/triad-app-notifications" "${notifications_digest}"
            update_digest "${overlay_file}" "971146591534.dkr.ecr.us-east-1.amazonaws.com/triad-app-worker" "${worker_digest}"
          }

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          attempts=5
          for attempt in $(seq 1 "${attempts}"); do
            echo "Promotion attempt ${attempt}/${attempts}"

            git -C gitops-platform fetch origin "${GITOPS_REF}"
            git -C gitops-platform checkout -B "${GITOPS_REF}" "origin/${GITOPS_REF}"

            overlay="gitops-platform/${GITOPS_PATH}"
            refresh_overlay "${overlay}"

            if git -C gitops-platform diff --quiet -- "${GITOPS_PATH}"; then
              echo "No GitOps overlay changes to commit."
              exit 0
            fi

            git -C gitops-platform add "${GITOPS_PATH}"
            git -C gitops-platform commit -m "ci: promote pulsecart digests for ${GITHUB_SHA::12}"

            if git -C gitops-platform push origin HEAD:"${GITOPS_REF}"; then
              echo "GitOps promotion pushed successfully."
              exit 0
            fi

            echo "Push rejected after concurrent updates; retrying on latest ${GITOPS_REF}."
            sleep $((attempt * 2))
          done

          echo "failed to push GitOps promotion after ${attempts} attempts" >&2
          exit 1
